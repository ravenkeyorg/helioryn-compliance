# Helioryn Compliance — Grant compliance intelligence configuration
# Data sources: US government APIs only (no web search)

[database]
url = "postgresql:///helioryn_dev?host=/tmp"

[cache]
url = "redis://localhost:6379/0"

[auth]
api_key = "hc-compliance-key"
admin_password = "admin"
session_secret = "hc-compliance-secret"

[llm]
provider = "ollama"
model = "qwen2.5:7b"
max_tokens = 4096
temperature = 0.1

[ollama]
model = "qwen2.5:7b"
base_url = "http://localhost:11434"
max_tokens = 4096
temperature = 0.1

[ingest]
fetch_delay = 0.3
auto_generate_queries = false

[ingest.ingestor]
type = "postgres"

# ── Primary API Sources ──────────────────────────────────────────

[[ingest.api_sources]]
type = "grants_gov"
name = "grants.gov"
enabled = true
topic = "grant-opportunities"
interval_minutes = 1440

[[ingest.api_sources]]
type = "federal_register"
name = "Federal Register"
enabled = true
topic = "federal-register"
interval_minutes = 120
days_back = 3

