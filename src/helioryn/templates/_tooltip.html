{% macro tooltip(text) -%}
<span x-data="{ open: false }" @mouseenter="open = true" @mouseleave="open = false" @focus="open = true" @blur="open = false" tabindex="0" class="relative inline-flex items-center cursor-help">
  <span class="inline-flex items-center justify-center w-3.5 h-3.5 rounded-full text-[10px] font-bold bg-gray-800 text-gray-500 hover:text-gray-300 hover:bg-gray-700 ml-1 transition-colors">?</span>
  <div x-show="open" x-cloak class="absolute z-50 bottom-full left-1/2 -translate-x-1/2 mb-2 px-3 py-2 bg-gray-900 border border-gray-700 text-xs text-gray-200 rounded-lg shadow-xl whitespace-normal max-w-[220px] text-center pointer-events-none">
    {{ text }}
  </div>
</span>
{%- endmacro %}
