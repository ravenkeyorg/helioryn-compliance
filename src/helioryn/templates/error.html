<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helioryn — Error</title>
<link rel="stylesheet" href="/static/css/archive.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>H</text></svg>">
<style>
.error-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
  text-align: center;
}

.error-icon {
  width: 64px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(181, 69, 69, 0.1);
  border: 1px solid rgba(181, 69, 69, 0.2);
  border-radius: 16px;
  margin-bottom: 1.5rem;
  color: var(--color-trust-low);
}

.error-page h1 {
  font-family: var(--font-heading);
  font-size: 1.5rem;
  margin-bottom: 0.75rem;
}

.error-page p {
  color: var(--color-text-secondary);
  margin-bottom: 2rem;
  max-width: 400px;
}

.error-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1.5rem;
  font-size: 0.9375rem;
  font-weight: 500;
  font-family: var(--font-body);
  color: white;
  background: linear-gradient(135deg, var(--color-accent) 0%, var(--color-violet) 100%);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s ease;
}

.error-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(79, 140, 255, 0.3);
  text-decoration: none;
  color: white;
}
</style>
</head>
<body>
<div class="error-page">
  <div class="error-icon">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
  </div>
  <h1>Something went wrong</h1>
  <p>{{ message }}</p>
  <a href="/" class="error-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    Go Home
  </a>
</div>
</body>
</html>
