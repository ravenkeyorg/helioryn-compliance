<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helioryn Compliance — Login</title>
<link rel="stylesheet" href="/static/css/archive.css">
</head>
<body class="login-body">
<main class="login-container">
  <div class="login-card">
    <h1 class="login-title">Helioryn</h1>
    <p class="login-subtitle">Intelligence Platform</p>
    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/login" class="login-form">
      <input type="hidden" name="next" value="{{ next or '/chat' }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" autofocus required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary login-btn">Sign In</button>
    </form>
  </div>
</main>
</body>
</html>
